function:
  name: AnalizarBoletasPompeyoFn
  runtime: python3.12
  handler: handler.lambda_handler
  description: |
    Analiza boletas y comprobantes Pompeyo para generar un artefacto batch auditable con inventario de adjuntos, OCR, candidatos de montos y categorías de gasto. No escribe en ROMA, no aprueba ni rechaza; solo devuelve evidencia normalizada con confianza 0..1 y ambigüedades explícitas.
  timeout: 300
  memory_size: 1024

  # Function type (optional - for categorization)
  # Set to 'agent' if this function is an AI agent that can be selected as the organization's default agent
  # Uncomment the line below for agent functions:
  # type: agent

  # Layers (built-in Chask layers)
  layers:
    - foundationMinimal
    - foundationApi
    - custom/pypdfium2_layer
  # Environment variables (optional)
  # environment:
  #   CUSTOM_VAR: your-value

  # Tenant data contract (optional)
  # Uncomment when this Lambda reads or writes tenant data through TenantDataClient.
  # Every table here must be created by an idempotent SQL migration in migrations/.
  # data:
  #   writes:
  #     - table: example_records
  #       mode: insert        # insert | update | upsert | lambda_owned
  #       columns: [title, status]
  #   reads:
  #     - table: example_records
  #       columns: [id, title, status, created_at]
  #   rpc:
  #     - GET /api/test/example-records/list

  # Function parameters (define your custom parameters here)
  parameters:
    required:
      - name: analysis_prompt
        type: string
        description: "Instrucciones de extracción para las boletas/comprobantes. Debe pedir OCR, montos, fechas, proveedores y posibles categorías de gasto sin decidir aprobación ni escribir en ROMA."

    optional:
      - name: file_uuids
        type: string
        description: "UUIDs de archivos específicos (lista JSON o string) o 'all' para procesar todos los PDF, DOCX e imágenes disponibles."

      - name: node_id
        type: string
        description: "ID del nodo del pipeline para sumar contexto descriptivo del requerimiento."

  # Widget configuration (optional - for UI integration)
  # Enable this to allow users to configure secrets and settings via the Chask UI
  widget:
    enabled: false
    type: dynamic_widget
    params: []
      # Example widget parameters:
      # - name: api_token
      #   type: secret        # Stored securely in AWS Secrets Manager
      #   required: true
      #   description: API token for external service
      #
      # - name: api_url
      #   type: string        # Plain text configuration
      #   required: false
      #   description: Custom API endpoint URL
      #
      # IMPORTANT: Parameter order matters if using resolve_positional()
      # For robust parameter access, use the extract_widget_params() helper
      # function in handler.py which handles both production and test formats

  # Testing configuration (used by chask function test:suite)
  # Declares what capabilities this function exercises so the CLI
  # knows which of the 4 mandatory test types to require.
  testing:
    handles_files: true       # Reads file_uuids / session attachments.
    produces_files: false     # Returns an auditable JSON artifact; does not upload/write files.
    # NOTE: widget testing is auto-detected from widget.enabled above.
    #       handles_files is also heuristically detected from parameter names
    #       (file_uuid, file_uuids, attachment*, *_file_*), but setting it
    #       explicitly here is the source of truth.
